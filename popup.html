<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>data-test highlighter</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="header">
        <div class="brand">
          <img class="brand-icon" src="data-test highlighter 128.png" alt="data-test highlighter icon" />
          <h1 class="title">data-test highlighter</h1>
        </div>
        <button id="themeToggle" class="theme-toggle" type="button" role="switch" aria-label="Toggle day/night theme" aria-checked="false"></button>
      </header>

      <label class="field">
        <span>Attribute name</span>
        <input id="attributeName" type="text" placeholder="data-test-id" autocomplete="off" />
      </label>

      <label class="field">
        <span>Attribute value (optional)</span>
        <input id="attributeValue" type="text" placeholder="submit-button" autocomplete="off" />
      </label>

      <label class="field color-field">
        <span>Highlight color</span>
        <input id="highlightColor" type="color" value="#ffeb3b" />
      </label>

      <button id="toggleButton" class="toggle off" type="button">Highlight is disabled</button>

      <div class="status-row">
        <div id="statusLine" class="status-line" aria-live="polite">
          <span id="statusLabel" class="status-label"></span>
          <button id="copyValueButton" class="copy-btn" type="button" title="Copy value" aria-label="Copy value">⧉</button>
          <span id="status" class="status"></span>
        </div>
        <div class="focus-controls" aria-label="Highlighted elements navigation">
          <button id="focusPrev" class="focus-btn" type="button" title="Previous highlighted element">▲</button>
          <button id="focusNext" class="focus-btn" type="button" title="Next highlighted element">▼</button>
          <div id="copyToast" class="copy-toast" role="status" aria-live="polite" aria-atomic="true"></div>
          <a class="github-link" href="https://github.com/arsenyganov-pixel" target="_blank" rel="noopener noreferrer">
            <svg class="github-icon" viewBox="0 0 16 16" aria-hidden="true" focusable="false">
              <path fill="currentColor" d="M8 0a8 8 0 0 0-2.53 15.59c.4.07.55-.17.55-.38l-.01-1.49c-2.01.44-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.58.82-2.14-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.5 7.5 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.14 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48l-.01 2.2c0 .21.14.46.55.38A8 8 0 0 0 8 0Z"></path>
            </svg>
            <span>@rcgunoff</span>
          </a>
        </div>
      </div>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
